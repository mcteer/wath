apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  labels:
    app: orders-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      automountServiceAccountToken: false
      serviceAccountName: orders-api
      containers:
        - name: orders-api
          image: orders-api:demo
          ports:
            - containerPort: 8000
              name: http
          env:
            # Tier-4: credential sourced from VSO-managed Secret (no static DSN in manifest)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orders-api-db
                  key: uri
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
