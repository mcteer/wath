services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 2s
      timeout: 5s
      retries: 10

  orders-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://orders:orders@postgres:5432/orders
    depends_on:
      postgres:
        condition: service_healthy
