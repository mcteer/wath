apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: orders-api-db
  namespace: payments-dev
spec:
  vaultAuthRef: vault-auth
  mount: database
  path: creds/orders-api
  rolloutRestartTargets:
    - kind: Deployment
      name: orders-api
  destination:
    name: orders-api-db
    create: true
