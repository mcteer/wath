id: vault-dynamic-secrets
version: 4
owner: security-engineering
rule_prefix: VDS
rules:
  - VDS-001
  - VDS-002
  - VDS-003
  - VDS-004
  - VDS-005
  - VDS-006
  - VDS-007
  - VDS-008
schema: schema/integration.params.schema.json
conformance_entry: conformance/verify.sh
runtimes:
  - kubernetes
  - nomad
  - vm
services:
  - hashicorp-vault
onboarding:
  artifacts:
    - integration.params.json
    - vault/policy.hcl
    - vault/auth-kubernetes-role.json
    - k8s/vso-dynamic-secret.yaml
    - k8s/deployment.yaml
    - .github/workflows/vault-verify.yml
  artifact_purposes:
    integration.params.json: Typed source of truth — app name, Vault creds path, TTLs, K8s identity binding (schema-valid; render all other artifacts from this)
    vault/policy.hcl: Least-privilege Vault policy — read on database/creds/<role> only; no path wildcards (VDS-004)
    vault/auth-kubernetes-role.json: Kubernetes auth role binding — ties this app's service account and namespace to the policy (VDS-006)
    k8s/vso-dynamic-secret.yaml: Vault Secrets Operator CR — syncs short-lived DB credentials from Vault into a Kubernetes Secret
    k8s/deployment.yaml: App Deployment wired to the VSO-managed Secret — no static DATABASE_URL or password env values (VDS-001)
    .github/workflows/vault-verify.yml: CI gate — sparse-checkouts Wath standards and re-runs conformance on every PR (VDS-008)
  golden_fixture: fixtures/tier4-orders-api
  golden_params: examples/integration.params.orders-api.json
  sandbox:
    install: conformance/install-sandbox-deps.sh
    start: conformance/start-sandbox.sh
  consumer_rule: vault-dynamic-secrets
  pr_template: .github/PULL_REQUEST_TEMPLATE/wath-onboarding.md
