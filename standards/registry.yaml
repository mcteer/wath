# Wath standards registry — marketplace catalog of platform service integrations.
# The engine loads this file to discover available standards at runtime.

standards:
  - id: vault-dynamic-secrets
    path: security/vault-dynamic-secrets
    owner: security-engineering
    version: 8
    rule_prefix: VDS
    version_notes: >
      Registry v7 alignment only — standard.yaml content is unchanged (v5).
      Start from main, run conformance first, and apply a minimal diff.
      Do not regenerate vault/policy.hcl or other artifacts already compliant on main
      unless a conformance gate fails.
    version_changelog:
      7: Track registry version for vault-dynamic-secrets v5 content baseline.
    runtimes:
      - kubernetes
      - nomad
      - vm
    services:
      - hashicorp-vault
